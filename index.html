<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <!-- TOPBAR -->

       target="_blank">

      </svg>
      Falar no WhatsApp
    </a>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <div class="badge">✦ Novos achados toda semana</div>
      <h1>Produtos garimpados<br>pra um novo dono.</h1>
      <p class="subtitle">Eletrônicos, celulares e muito mais — revisados e com preço justo. Tudo pelo WhatsApp.</p>
    </div>
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-label">disponíveis</span>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <span class="stat-num">100%</span>
        <span class="stat-label">revisados</span>
      </div>
      <div class="stat-div"></div>
      <div class="stat">
        <span class="stat-num">1</span>
        <span class="stat-label">vendedor</span>
      </div>
    </div>
  </section>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-cat="todos">Todos</button>
      <button class="filter-btn" data-cat="celular">Celular</button>
      <button class="filter-btn" data-cat="eletronico">Eletrônico</button>
      <button class="filter-btn" data-cat="roupa">Roupa</button>
      <button class="filter-btn" data-cat="outro">Outro</button>
    </div>
    <span class="result-count" id="resultCount"></span>
  </div>

  <!-- LISTAGEM -->
  <main class="listing" id="listing"></main>

  <!-- MODAL DETALHE -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-handle"></div>

      <div class="modal-gallery">
        <div class="gallery-track" id="galleryTrack"></div>
        <div class="gallery-dots" id="galleryDots"></div>
      </div>

      <div class="modal-body">
        <div class="modal-top">
          <div>
            <span class="modal-cat" id="modalCat"></span>
            <div class="modal-name" id="modalName"></div>
          </div>
          <div class="modal-price" id="modalPrice"></div>
        </div>
        <span class="modal-condition" id="modalCondition"></span>
        <div class="modal-desc" id="modalDesc"></div>

        <a class="btn-wpp-modal" id="modalWppBtn" href="#" target="_blank">
          <svg width="18" height="18" fill="white" viewBox="0 0 24 24">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.558 4.12 1.533 5.849L.057 23.57a.75.75 0 0 0 .924.924l5.797-1.478A11.946 11.946 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.89 0-3.663-.5-5.2-1.376l-.374-.214-3.878.988.994-3.77-.234-.389A9.953 9.953 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
          </svg>
          Quero este produto
        </a>
      </div>
    </div>
  </div>

  <!-- LIGHTBOX FULLSCREEN -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">✕</button>
    <button class="lb-arrow lb-prev" id="lbPrev">
      <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="lb-img-wrap">
      <img class="lb-img" id="lbImg" src="" alt="" />
    </div>
    <button class="lb-arrow lb-next" id="lbNext">
      <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="lb-counter" id="lbCounter"></div>
  </div>

  <!-- RODAPÉ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-brand">JáFoiMeu</span>
      <span class="footer-divider">·</span>
      <span class="footer-copy">© <span id="footerYear"></span> Tiago. Todos os direitos reservados.</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
